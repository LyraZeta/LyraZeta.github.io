# Nginx reverse proxy for the dynamic LyraZeta site.
# Copy this to /etc/nginx/sites-available/default or adapt it for your server.

server {
    listen 80;
    server_name lyrazeta.space www.lyrazeta.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lyrazeta.space www.lyrazeta.space;

    ssl_certificate /etc/letsencrypt/live/lyrazeta.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lyrazeta.space/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384";

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Optional: let Nginx serve immutable assets directly.
    # Do not serve HTML directly from _site, otherwise article protection is bypassed.
    root /home/lyra/LyraZeta.github.io/_site;
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|webp|woff|woff2|ttf|svg)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri @lyrazeta_backend;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location @lyrazeta_backend {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
