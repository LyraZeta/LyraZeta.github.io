name: deploy_static_pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  deploy_static:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Build static GitHub Pages site
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          bundle exec jekyll build --config _config.yml,_config.github-pages.yml --destination _site 2>&1 | tee /tmp/jekyll-build.log

      - name: Report static build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          message="$(tail -n 20 /tmp/jekyll-build.log | tr '\n' ' ' | sed -e 's/%/%25/g' -e 's/\r/%0D/g')"
          echo "::error file=_config.yml,line=1,title=Jekyll build failed::$message"
          exit 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
